<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphRAG Demo: AGE + pgvector</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>GraphRAG Demo</h1>
        <p class="subtitle">Apache AGE + pgvector: Side-by-Side Retrieval Comparison</p>
    </header>

    <div class="search-section">
        <div class="search-bar">
            <input type="text" id="question-input" placeholder="Ask a question about the organization...">
            <button id="search-btn" onclick="runQuery()">Search</button>
        </div>
        <div class="examples">
            <span class="examples-label">Try:</span>
            <div id="example-buttons"></div>
        </div>
    </div>

    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Running all four retrieval strategies...</p>
    </div>

    <div id="results" class="results hidden">
        <div class="strategy-column" id="col-vector">
            <div class="strategy-header vector-header">
                <h2>Vector-Only</h2>
                <span class="strategy-desc">pgvector cosine similarity</span>
            </div>
            <div class="timing-bar" id="timing-vector"></div>
            <div class="answer-box" id="answer-vector"></div>
            <div class="results-list" id="results-vector"></div>
        </div>

        <div class="strategy-column" id="col-hybrid">
            <div class="strategy-header hybrid-header">
                <h2>Hybrid</h2>
                <span class="strategy-desc">RRF fusion of vector + BM25</span>
            </div>
            <div class="timing-bar" id="timing-hybrid"></div>
            <div class="answer-box" id="answer-hybrid"></div>
            <div class="results-list" id="results-hybrid"></div>
        </div>

        <div class="strategy-column" id="col-graph">
            <div class="strategy-header graph-header">
                <h2>Graph-Only</h2>
                <span class="strategy-desc">Apache AGE Cypher traversal</span>
            </div>
            <div class="timing-bar" id="timing-graph"></div>
            <div class="answer-box" id="answer-graph"></div>
            <div class="results-list" id="results-graph"></div>
        </div>

        <div class="strategy-column" id="col-production">
            <div class="strategy-header production-header">
                <h2>3-Stage (Production)</h2>
                <span class="strategy-desc">Hybrid &rarr; Boost &rarr; Conditional Expand</span>
            </div>
            <div class="timing-bar" id="timing-production"></div>
            <div class="answer-box" id="answer-production"></div>
            <div class="results-list" id="results-production"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
